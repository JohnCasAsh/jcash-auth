<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — JCASH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { min-height: 100svh; font-family: "Inter", sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; border: none; background: none; }

    .glow-top { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 50vw; height: 35vh; border-radius: 0 0 50% 50%; background: rgba(255,122,0,0.06); filter: blur(100px); pointer-events: none; z-index: 0; }
    .glow-bot { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 40vw; height: 25vh; border-radius: 50% 50% 0 0; background: rgba(255,122,0,0.05); filter: blur(100px); pointer-events: none; z-index: 0; }

    .card-wrap { position: relative; z-index: 2; width: 100%; max-width: 380px; }
    .card {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 1.25rem; padding: 2rem 1.75rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      position: relative; overflow: hidden;
    }
    .card::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 75%; height: 1px; background: linear-gradient(to right, transparent, rgba(255,122,0,0.4), transparent); }

    .card-logo { display: flex; justify-content: center; margin-bottom: 1rem; }
    .card-logo img { width: 56px; height: 56px; object-fit: contain; }
    .card-title { font-family: "Orbitron", sans-serif; font-size: 1.2rem; font-weight: 900; text-align: center; color: #fff; letter-spacing: 0.04em; margin-bottom: 0.3rem; }
    .card-sub { font-size: 0.78rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 1.75rem; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
    .field-row { display: flex; align-items: center; position: relative; }
    .field-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: rgba(255,255,255,0.3); pointer-events: none; }
    .field-icon svg { width: 100%; height: 100%; display: block; }
    input {
      width: 100%; height: 42px; padding: 0 0.75rem 0 2.5rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 0.625rem; color: #fff; font-size: 0.875rem; font-family: inherit;
      transition: border-color 200ms, background 200ms;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus { border-color: rgba(255,122,0,0.5); background: rgba(255,255,255,0.08); }
    input.no-icon { padding-left: 0.75rem; }
    .eye-btn { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); padding: 0; background: none; border: none; cursor: pointer; display: flex; align-items: center; }
    .eye-btn svg { width: 16px; height: 16px; }

    .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .remember { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: rgba(255,255,255,0.45); cursor: pointer; }
    .remember input[type=checkbox] { width: 15px; height: 15px; accent-color: #ff7a00; cursor: pointer; }
    .forgot-link { font-size: 0.75rem; color: rgba(255,122,0,0.8); transition: color 160ms; }
    .forgot-link:hover { color: #ff7a00; }

    .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.75rem; color: #f87171; text-align: center; margin-bottom: 1rem; display: none; }
    .error-box.show { display: block; }

    .btn-primary {
      width: 100%; height: 44px; border-radius: 0.75rem;
      background: #ff7a00; color: #000;
      font-family: "Orbitron", sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
      border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,122,0,0.35);
      transition: background 160ms, box-shadow 160ms, transform 160ms;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .btn-primary:hover { background: #ff8c1a; box-shadow: 0 6px 28px rgba(255,122,0,0.5); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .divider-text { font-size: 0.72rem; color: rgba(255,255,255,0.3); white-space: nowrap; }

    .oauth-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.5rem; margin-bottom: 1.25rem; }
    .oauth-btn {
      height: 40px; border-radius: 0.625rem;
      border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.05);
      color: #fff; font-size: 0.75rem; font-weight: 600; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      cursor: pointer; transition: background 160ms;
    }
    .oauth-btn:hover { background: rgba(255,255,255,0.10); }
    .oauth-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .card-footer { text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.4); }
    .card-footer a { color: #ff7a00; font-weight: 600; transition: color 160ms; }
    .card-footer a:hover { color: #ff8c1a; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.4); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="glow-top"></div>
  <div class="glow-bot"></div>

  <div class="card-wrap">
    <div class="card">
      <div class="card-logo"><img src="/JCashw.png" alt="JCASH" /></div>
      <h1 class="card-title">Welcome Back</h1>
      <p class="card-sub">Sign in to your JCASH account</p>

      <form id="signin-form">
        <div class="field">
          <div class="field-row">
            <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <input type="email" id="email" placeholder="Email address" required autocomplete="email" />
          </div>
        </div>
        <div class="field">
          <div class="field-row">
            <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
            <button type="button" class="eye-btn" id="eye-btn" onclick="toggleEye()">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
            </button>
          </div>
        </div>

        <div class="row-between">
          <label class="remember"><input type="checkbox" id="remember" /> Remember me</label>
          <a href="/forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <div class="error-box" id="error-box"></div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span id="btn-text">SIGN IN</span>
          <svg id="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <div class="divider"><div class="divider-line"></div><span class="divider-text">or continue with</span><div class="divider-line"></div></div>

      <div class="oauth-grid">
        <button class="oauth-btn" onclick="signInWithGitHub()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
        <button class="oauth-btn" onclick="signInWithGoogle()">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="oauth-btn" onclick="signInWithPhone()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.23 19.79 19.79 0 0 1 1.61 4.68 2 2 0 0 1 3.58 2.5h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.5 17.5z"/></svg>
          Phone
        </button>
      </div>

      <div class="card-footer">Don't have an account? <a href="/sign-up.html">Sign up</a></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, GithubAuthProvider, setPersistence, browserLocalStorage, browserSessionStorage } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'

    const config = await fetch('/__/firebase/init.json').then(r => r.json())
    const app = initializeApp(config)
    const auth = getAuth(app)
    const googleProvider = new GoogleAuthProvider()
    const githubProvider = new GithubAuthProvider()

    function showError(msg) {
      var box = document.getElementById('error-box')
      box.textContent = msg
      box.classList.add('show')
    }
    function hideError() { document.getElementById('error-box').classList.remove('show') }
    function setLoading(on) {
      var btn = document.getElementById('submit-btn')
      var txt = document.getElementById('btn-text')
      var arrow = document.getElementById('btn-arrow')
      btn.disabled = on
      if (on) { txt.textContent = ''; arrow.style.display = 'none'; btn.innerHTML = '<div class="spinner"></div>' }
      else { btn.innerHTML = '<span id="btn-text">SIGN IN</span><svg id="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>' }
    }

    document.getElementById('signin-form').addEventListener('submit', async function(e) {
      e.preventDefault()
      hideError()
      setLoading(true)
      var email = document.getElementById('email').value
      var password = document.getElementById('password').value
      var remember = document.getElementById('remember').checked
      try {
        await setPersistence(auth, remember ? browserLocalStorage : browserSessionStorage)
        await signInWithEmailAndPassword(auth, email, password)
        window.location.href = '/dashboard.html'
      } catch (err) {
        showError(err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)\.?/, '').trim())
        setLoading(false)
      }
    })

    window.signInWithGoogle = async function() {
      hideError()
      try {
        await signInWithPopup(auth, googleProvider)
        window.location.href = '/dashboard.html'
      } catch (err) {
        showError(err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)\.?/, '').trim())
      }
    }

    window.signInWithGitHub = async function() {
      hideError()
      try {
        await signInWithPopup(auth, githubProvider)
        window.location.href = '/dashboard.html'
      } catch (err) {
        showError(err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)\.?/, '').trim())
      }
    }

    window.signInWithPhone = function() {
      window.location.href = '/sign-in.html?method=phone'
    }

    window.toggleEye = function() {
      var input = document.getElementById('password')
      input.type = input.type === 'password' ? 'text' : 'password'
    }
  </script>
</body>
</html>
