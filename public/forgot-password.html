<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — JCASH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { min-height: 100svh; font-family: "Inter", sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; border: none; background: none; }

    .glow-top { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 50vw; height: 35vh; border-radius: 0 0 50% 50%; background: rgba(255,122,0,0.06); filter: blur(100px); pointer-events: none; z-index: 0; }
    .glow-bot { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 40vw; height: 25vh; border-radius: 50% 50% 0 0; background: rgba(255,122,0,0.05); filter: blur(100px); pointer-events: none; z-index: 0; }

    .card-wrap { position: relative; z-index: 2; width: 100%; max-width: 380px; }
    .card {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 1.25rem; padding: 2rem 1.75rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      position: relative; overflow: hidden;
    }
    .card::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 75%; height: 1px; background: linear-gradient(to right, transparent, rgba(255,122,0,0.4), transparent); }

    .card-logo { display: flex; justify-content: center; margin-bottom: 1rem; }
    .card-logo img { width: 56px; height: 56px; object-fit: contain; }
    .card-title { font-family: "Orbitron", sans-serif; font-size: 1.2rem; font-weight: 900; text-align: center; color: #fff; letter-spacing: 0.04em; margin-bottom: 0.3rem; }
    .card-sub { font-size: 0.78rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 1.75rem; line-height: 1.6; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
    .field-row { display: flex; align-items: center; position: relative; }
    .field-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: rgba(255,255,255,0.3); pointer-events: none; }
    .field-icon svg { width: 100%; height: 100%; display: block; }
    input {
      width: 100%; height: 42px; padding: 0 0.75rem 0 2.5rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 0.625rem; color: #fff; font-size: 0.875rem; font-family: inherit;
      transition: border-color 200ms, background 200ms; outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus { border-color: rgba(255,122,0,0.5); background: rgba(255,255,255,0.08); }

    .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.75rem; color: #f87171; text-align: center; margin-bottom: 1rem; display: none; }
    .error-box.show { display: block; }

    .success-box { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); border-radius: 0.75rem; padding: 1.25rem; text-align: center; display: none; }
    .success-box.show { display: block; }
    .success-icon { width: 40px; height: 40px; margin: 0 auto 0.75rem; color: #10b981; }
    .success-icon svg { width: 100%; height: 100%; }
    .success-title { font-family: "Orbitron", sans-serif; font-size: 0.9rem; font-weight: 700; color: #10b981; margin-bottom: 0.4rem; }
    .success-sub { font-size: 0.75rem; color: rgba(255,255,255,0.4); line-height: 1.6; }

    .btn-primary {
      width: 100%; height: 44px; border-radius: 0.75rem;
      background: #ff7a00; color: #000;
      font-family: "Orbitron", sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
      border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,122,0,0.35);
      transition: background 160ms, box-shadow 160ms, transform 160ms;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .btn-primary:hover { background: #ff8c1a; box-shadow: 0 6px 28px rgba(255,122,0,0.5); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .back-link { display: flex; align-items: center; justify-content: center; gap: 0.35rem; font-size: 0.75rem; color: rgba(255,255,255,0.4); transition: color 160ms; }
    .back-link:hover { color: rgba(255,255,255,0.7); }
    .back-link svg { width: 13px; height: 13px; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.4); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="glow-top"></div>
  <div class="glow-bot"></div>

  <div class="card-wrap">
    <div class="card">
      <div class="card-logo"><img src="/JCashw.png" alt="JCASH" /></div>
      <h1 class="card-title">Reset Password</h1>
      <p class="card-sub">Enter your email and we'll send you a link to reset your password.</p>

      <div class="success-box" id="success-box">
        <div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="success-title">Email Sent!</div>
        <div class="success-sub" id="success-msg">Check your inbox for a password reset link.</div>
      </div>

      <form id="fp-form">
        <div class="field">
          <div class="field-row">
            <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <input type="email" id="email" placeholder="Email address" required autocomplete="email" />
          </div>
        </div>

        <div class="error-box" id="error-box"></div>

        <button type="submit" class="btn-primary" id="submit-btn">
          SEND RESET LINK
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <a href="/sign-in.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to sign in
      </a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'

    const config = await fetch('/__/firebase/init.json').then(r => r.json())
    const app = initializeApp(config)
    const auth = getAuth(app)

    function showError(msg) { var b = document.getElementById('error-box'); b.textContent = msg; b.classList.add('show') }
    function hideError() { document.getElementById('error-box').classList.remove('show') }
    function setLoading(on) {
      var btn = document.getElementById('submit-btn')
      btn.disabled = on
      btn.innerHTML = on ? '<div class="spinner"></div>' : 'SEND RESET LINK <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'
    }

    document.getElementById('fp-form').addEventListener('submit', async function(e) {
      e.preventDefault()
      hideError()
      var email = document.getElementById('email').value
      setLoading(true)
      try {
        await sendPasswordResetEmail(auth, email)
        document.getElementById('fp-form').style.display = 'none'
        document.getElementById('success-msg').textContent = 'We sent a reset link to ' + email
        document.getElementById('success-box').classList.add('show')
      } catch (err) {
        showError(err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)\.?/, '').trim())
        setLoading(false)
      }
    })
  </script>
</body>
</html>
